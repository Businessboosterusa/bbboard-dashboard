<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBBoard #19 — Аналитика звонков</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --surface: #17171a;
  --surface2: #1e1e22;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f2;
  --text2: #8a8a9a;
  --text3: #555562;
  --accent: #f5c842;
  --accent2: #e8b800;
  --green: #3ecf8e;
  --green-bg: rgba(62,207,142,0.1);
  --amber: #f5a623;
  --amber-bg: rgba(245,166,35,0.1);
  --red: #e05252;
  --red-bg: rgba(224,82,82,0.1);
  --blue: #5b8dee;
  --blue-bg: rgba(91,141,238,0.1);
  --radius: 10px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.mono { font-family: 'DM Mono', monospace; }

/* Layout */
.shell { display: flex; min-height: 100vh; }
.sidebar { width: 220px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 28px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.main { flex: 1; padding: 32px 36px; max-width: 960px; }

/* Sidebar */
.brand { padding: 0 24px 28px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.brand-name { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
.brand-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.nav-section { padding: 0 12px; margin-bottom: 8px; }
.nav-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 0 12px; margin-bottom: 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius); cursor: pointer; font-size: 13px; color: var(--text2); transition: all .15s; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: rgba(245,200,66,0.1); color: var(--accent); }
.nav-icon { width: 16px; height: 16px; opacity: 0.7; }

/* Filters */
.filters { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
.filter-group { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.filter-btn { padding: 8px 16px; font-size: 12px; font-weight: 500; color: var(--text2); background: none; border: none; cursor: pointer; transition: all .15s; font-family: 'Manrope', sans-serif; }
.filter-btn:hover { color: var(--text); background: var(--surface2); }
.filter-btn.active { background: var(--accent); color: #000; font-weight: 600; }

/* Stats grid */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
.stat-label { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 10px; }
.stat-val { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 6px; }

/* Type split */
.type-split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
.type-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
.type-card-title { font-size: 12px; color: var(--text3); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.type-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.type-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.type-metric { }
.type-metric-val { font-size: 20px; font-weight: 700; color: var(--text); }
.type-metric-label { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* Calls table */
.section-title { font-size: 13px; font-weight: 600; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 14px; }
.calls-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.table-head { display: grid; grid-template-columns: 200px 90px 80px 80px 120px 110px; gap: 0; padding: 10px 20px; border-bottom: 1px solid var(--border); }
.th { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
.call-row { display: grid; grid-template-columns: 200px 90px 80px 80px 120px 110px; gap: 0; padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; align-items: center; }
.call-row:last-child { border-bottom: none; }
.call-row:hover { background: var(--surface2); }
.client-info { display: flex; align-items: center; gap: 10px; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(245,200,66,0.15); color: var(--accent); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.client-name { font-size: 13px; font-weight: 600; color: var(--text); }
.client-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
.td { font-size: 12px; color: var(--text2); }
.prob-cell { display: flex; align-items: center; gap: 8px; }
.prob-bar-bg { width: 50px; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.prob-bar-fill { height: 100%; border-radius: 2px; }
.prob-num { font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; min-width: 32px; }
.badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-gray { background: rgba(255,255,255,0.05); color: var(--text3); }
.badge-blue { background: var(--blue-bg); color: var(--blue); }

/* Detail view */
.detail-wrap { display: none; }
.detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
.back-btn { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); background: none; border: 1px solid var(--border2); border-radius: var(--radius); padding: 7px 14px; cursor: pointer; font-family: 'Manrope', sans-serif; transition: all .15s; }
.back-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
.detail-name { font-size: 22px; font-weight: 700; color: var(--text); }
.detail-meta { font-size: 12px; color: var(--text3); margin-top: 6px; display: flex; gap: 16px; flex-wrap: wrap; }
.detail-meta span { display: flex; align-items: center; gap: 4px; }
.detail-scores { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.dscore { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }
.dscore-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
.dscore-val { font-size: 22px; font-weight: 700; }
.detail-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; }
.db-head { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.db-body { padding: 16px 18px; }
.db-arrow { font-size: 11px; color: var(--text3); transition: transform .2s; }
.db-collapsed .db-body { display: none; }
.db-collapsed .db-arrow { transform: rotate(-90deg); }
.script-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.script-item:last-child { border-bottom: none; }
.script-stage { font-size: 12px; font-weight: 600; color: var(--text); width: 120px; flex-shrink: 0; padding-top: 1px; }
.script-comment { font-size: 12px; color: var(--text2); flex: 1; line-height: 1.6; }
.obj-card { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.obj-card:last-child { margin-bottom: 0; }
.obj-head { padding: 10px 14px; background: var(--surface2); font-size: 12px; font-weight: 600; color: var(--text); }
.obj-body { padding: 12px 14px; display: grid; gap: 8px; }
.obj-row { display: flex; gap: 10px; font-size: 12px; }
.obj-label { color: var(--text3); width: 100px; flex-shrink: 0; }
.obj-val { color: var(--text2); flex: 1; line-height: 1.6; }
.action-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.action-item:last-child { border-bottom: none; }
.action-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.action-content { flex: 1; }
.action-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.action-detail { font-size: 12px; color: var(--text2); line-height: 1.6; }
.rec-item { padding: 10px 12px; background: var(--surface2); border-radius: var(--radius); margin-bottom: 8px; font-size: 12px; color: var(--text2); line-height: 1.6; }
.rec-item:last-child { margin-bottom: 0; }
.prob-section { }
.prob-big { font-size: 36px; font-weight: 700; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
.prob-bar-full { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; margin-bottom: 16px; }
.prob-bar-full-fill { height: 100%; border-radius: 3px; }
.factor { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.factor:last-child { border-bottom: none; }
.factor-sign { font-weight: 700; width: 44px; flex-shrink: 0; font-family: 'DM Mono', monospace; }
.factor-text { color: var(--text2); flex: 1; }
.next-step-box { margin-top: 12px; padding: 14px; background: rgba(91,141,238,0.08); border: 1px solid rgba(91,141,238,0.2); border-radius: var(--radius); }
.ns-label { font-size: 10px; font-weight: 600; color: var(--blue); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.ns-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
.summary-box { padding: 14px 16px; background: rgba(245,200,66,0.05); border: 1px solid rgba(245,200,66,0.15); border-radius: var(--radius); font-size: 13px; color: var(--text2); line-height: 1.7; }
.quote { font-style: italic; color: var(--text3); }
.empty { padding: 48px; text-align: center; color: var(--text3); font-size: 13px; }
</style>
</head>
<body>
<div class="shell">

<aside class="sidebar">
  <div class="brand">
    <div class="brand-name">BBBoard #19</div>
    <div class="brand-sub">Аналитика звонков</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Менеджеры</div>
    <button class="nav-item active" onclick="setManager('all',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Все менеджеры
    </button>
    <button class="nav-item" onclick="setManager('Kamila',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Kamila
    </button>
    <button class="nav-item" onclick="setManager('Vitalina',this)">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Vitalina
    </button>
  </div>
</aside>

<main class="main">

  <!-- MAIN VIEW -->
  <div id="main-view">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <div>
        <h1 style="font-size:22px;font-weight:700;color:var(--text)">Аналитика звонков</h1>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">С 1 апреля 2025 · BBBoard #19</div>
      </div>
      <div class="filter-group">
        <button class="filter-btn" onclick="setPeriod('all',this)">Всё время</button>
        <button class="filter-btn active" onclick="setPeriod('week',this)">Эта неделя</button>
        <button class="filter-btn" onclick="setPeriod('month',this)">Месяц</button>
      </div>
    </div>

    <div class="stats" id="stats-grid"></div>

    <div class="type-split" id="type-split"></div>

    <div class="section-title">Все звонки</div>
    <div class="calls-table">
      <div class="table-head">
        <div class="th">Клиент</div>
        <div class="th">Дата</div>
        <div class="th">Тип</div>
        <div class="th">Оценка</div>
        <div class="th">Вероятность</div>
        <div class="th">Статус</div>
      </div>
      <div id="calls-body"></div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view" class="detail-wrap"></div>

</main>
</div>

<script>
var state = { period: 'week', manager: 'all', calls: [] };

function probColor(p) {
  if (p >= 70) return 'var(--green)';
  if (p >= 40) return 'var(--amber)';
  return 'var(--red)';
}

function statusBadge(s) {
  const map = {
    closed: ['badge-green', 'Закрыт'],
    pending: ['badge-amber', 'Отложено'],
    lost: ['badge-red', 'Отказ'],
    nq: ['badge-gray', 'Не квалиф.']
  };
  const [cls, label] = map[s] || ['badge-gray', s];
  return `<span class="badge ${cls}">${label}</span>`;
}

function typeBadge(t) {
  return t === 'Входящий'
    ? '<span class="badge badge-blue">Вход.</span>'
    : '<span class="badge badge-gray">Исход.</span>';
}

function initials(name) {
  return name.split(' ').map(p => p[0]).join('').toUpperCase().slice(0,2);
}

function typeMetrics(calls, type) {
  const list = calls.filter(c => c.call_type === type);
  const total = list.length;
  const closed = list.filter(c => c.status === 'closed').length;
  const pending = list.filter(c => c.status === 'pending').length;
  const qualified = list.filter(c => c.qualified === 'Да');
  const avg = qualified.length ? Math.round(qualified.reduce((a,c) => a+c.probability,0)/qualified.length) : 0;
  return {total, closed, pending, avg};
}

function renderStats(calls) {
  const total = calls.length;
  const closed = calls.filter(c => c.status==='closed').length;
  const pending = calls.filter(c => c.status==='pending').length;
  const qualified = calls.filter(c => c.qualified==='Да');
  const avg = qualified.length ? Math.round(qualified.reduce((a,c)=>a+c.probability,0)/qualified.length) : 0;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat"><div class="stat-label">Всего звонков</div><div class="stat-val">${total}</div><div class="stat-sub">за выбранный период</div></div>
    <div class="stat"><div class="stat-label">Факт закрытых</div><div class="stat-val" style="color:var(--green)">${closed}</div><div class="stat-sub">оплата получена</div></div>
    <div class="stat"><div class="stat-label">Вероятных продаж</div><div class="stat-val" style="color:var(--amber)">${pending}</div><div class="stat-sub">в работе</div></div>
    <div class="stat"><div class="stat-label">Средняя вероятность</div><div class="stat-val mono">${avg}%</div><div class="stat-sub">по квалиф. звонкам</div></div>
  `;

  const inc = typeMetrics(calls, 'Входящий');
  const out = typeMetrics(calls, 'Исходящий');

  document.getElementById('type-split').innerHTML = `
    <div class="type-card">
      <div class="type-card-title"><div class="type-dot" style="background:var(--blue)"></div>Входящие звонки</div>
      <div class="type-metrics">
        <div class="type-metric"><div class="type-metric-val">${inc.total}</div><div class="type-metric-label">Всего</div></div>
        <div class="type-metric"><div class="type-metric-val" style="color:var(--green)">${inc.closed}</div><div class="type-metric-label">Закрыты</div></div>
        <div class="type-metric"><div class="type-metric-val" style="color:var(--amber)">${inc.pending}</div><div class="type-metric-label">В работе</div></div>
        <div class="type-metric"><div class="type-metric-val mono">${inc.avg}%</div><div class="type-metric-label">Вероятность</div></div>
      </div>
    </div>
    <div class="type-card">
      <div class="type-card-title"><div class="type-dot" style="background:var(--text3)"></div>Исходящие звонки</div>
      <div class="type-metrics">
        <div class="type-metric"><div class="type-metric-val">${out.total}</div><div class="type-metric-label">Всего</div></div>
        <div class="type-metric"><div class="type-metric-val" style="color:var(--green)">${out.closed}</div><div class="type-metric-label">Закрыты</div></div>
        <div class="type-metric"><div class="type-metric-val" style="color:var(--amber)">${out.pending}</div><div class="type-metric-label">В работе</div></div>
        <div class="type-metric"><div class="type-metric-val mono">${out.avg}%</div><div class="type-metric-label">Вероятность</div></div>
      </div>
    </div>
  `;
}

function renderCalls(calls) {
  if (!calls.length) {
    document.getElementById('calls-body').innerHTML = '<div class="empty">Звонков за выбранный период нет</div>';
    return;
  }
  document.getElementById('calls-body').innerHTML = calls.map(c => {
    const color = probColor(c.probability);
    const fill = c.status === 'nq' ? 0 : c.probability;
    return `<div class="call-row" onclick="showDetail(${c.id})">
      <div class="client-info">
        <div class="avatar">${initials(c.client_name)}</div>
        <div><div class="client-name">${c.client_name}</div><div class="client-meta">${c.manager} · ${c.revenue||''}</div></div>
      </div>
      <div class="td">${c.date}</div>
      <div class="td">${typeBadge(c.call_type)}</div>
      <div class="td mono" style="font-weight:600">${c.score_total}/10</div>
      <div class="prob-cell">
        <div class="prob-bar-bg"><div class="prob-bar-fill" style="width:${fill}%;background:${color}"></div></div>
        <span class="prob-num" style="color:${color}">${c.probability}%</span>
      </div>
      <div>${statusBadge(c.status)}</div>
    </div>`;
  }).join('');
}

async function loadCalls() {
  const params = new URLSearchParams({ period: state.period, manager: state.manager });
  const res = await fetch('/api/calls?' + params);
  state.calls = await res.json();
  renderStats(state.calls);
  renderCalls(state.calls);
}

async function showDetail(id) {
  const res = await fetch('/api/calls/' + id);
  const c = await res.json();
  const fa = c.full_analysis || {};

  document.getElementById('main-view').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.style.display = 'block';

  const color = probColor(c.probability);
  const fill = c.status === 'nq' ? 0 : c.probability;

  const scriptHtml = (fa.script||[]).map(s =>
    `<div class="script-item"><div class="script-stage">${s.icon} ${s.stage}</div><div class="script-comment">${s.comment}</div></div>`
  ).join('') || '<div class="empty" style="padding:16px">Данные недоступны</div>';

  const objHtml = (fa.objections||[]).length ? (fa.objections||[]).map(o => `
    <div class="obj-card">
      <div class="obj-head">${o.title}</div>
      <div class="obj-body">
        <div class="obj-row"><span class="obj-label">Цитата</span><span class="obj-val quote">${o.quote}</span></div>
        <div class="obj-row"><span class="obj-label">Тип</span><span class="obj-val">${o.type}</span></div>
        <div class="obj-row"><span class="obj-label">Как отработал</span><span class="obj-val">${o.how}</span></div>
        <div class="obj-row"><span class="obj-label">По скрипту</span><span class="obj-val"><span class="badge ${o.script_match==='Да'?'badge-green':o.script_match==='Частично'?'badge-amber':'badge-red'}">${o.script_match}</span></span></div>
        <div class="obj-row"><span class="obj-label">Результат</span><span class="obj-val">${o.result}</span></div>
        <div class="obj-row"><span class="obj-label">Как надо</span><span class="obj-val">${o.fix}</span></div>
      </div>
    </div>`).join('') : '<div style="font-size:12px;color:var(--text3);padding:4px 0">Возражений не зафиксировано</div>';

  const strongHtml = (fa.strong||[]).map(s =>
    `<div class="action-item"><div class="action-dot" style="background:var(--green)"></div><div class="action-content"><div class="action-title">${s.text}</div><div class="action-detail">${s.detail}</div></div></div>`
  ).join('') || '<div style="font-size:12px;color:var(--text3)">Нет данных</div>';

  const weakHtml = (fa.weak||[]).map(s =>
    `<div class="action-item"><div class="action-dot" style="background:var(--red)"></div><div class="action-content"><div class="action-title">${s.text}</div><div class="action-detail">${s.detail}</div></div></div>`
  ).join('') || '<div style="font-size:12px;color:var(--text3)">Слабых моментов не выявлено</div>';

  const recsHtml = (fa.recommendations||[]).map(r => `<div class="rec-item">${r}</div>`).join('');

  const factorsHtml = (fa.prob_factors||[]).map(f => {
    const plus = f.sign.startsWith('+');
    return `<div class="factor"><span class="factor-sign" style="color:${plus?'var(--green)':'var(--red)'}">${f.sign}</span><span class="factor-text">${f.text}</span></div>`;
  }).join('');

  dv.innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-name">${c.client_name}</div>
        <div class="detail-meta">
          <span>${c.date}</span>
          <span>${c.manager}</span>
          <span>${typeBadge(c.call_type)}</span>
          <span style="color:var(--text3)">${c.niche||c.revenue||''}</span>
          ${c.doc_link ? `<a href="${c.doc_link}" target="_blank" style="color:var(--accent);text-decoration:none;font-size:12px">Открыть Doc →</a>` : ''}
        </div>
      </div>
      <button class="back-btn" onclick="backToList()">← Назад</button>
    </div>

    <div class="detail-scores">
      <div class="dscore"><div class="dscore-label">Итоговая оценка</div><div class="dscore-val" style="color:var(--accent)">${c.score_total}/10</div></div>
      <div class="dscore"><div class="dscore-label">Скрипт</div><div class="dscore-val">${c.score_script}/10</div></div>
      <div class="dscore"><div class="dscore-label">Возражения</div><div class="dscore-val">${c.score_objections}/10</div></div>
      <div class="dscore"><div class="dscore-label">Вероятность</div><div class="dscore-val mono" style="color:${color}">${c.probability}%</div></div>
    </div>

    <div class="detail-block">
      <div class="db-head" onclick="toggleBlock(this)">Резюме для руководителя <span class="db-arrow">▾</span></div>
      <div class="db-body"><div class="summary-box">${c.summary||'—'}</div></div>
    </div>

    <div class="detail-block">
      <div class="db-head" onclick="toggleBlock(this)">Соответствие скрипту <span class="db-arrow">▾</span></div>
      <div class="db-body">${scriptHtml}</div>
    </div>

    <div class="detail-block">
      <div class="db-head" onclick="toggleBlock(this)">База возражений <span class="db-arrow">▾</span></div>
      <div class="db-body">${objHtml}</div>
    </div>

    <div class="detail-block">
      <div class="db-head" onclick="toggleBlock(this)">Сильные моменты <span class="db-arrow">▾</span></div>
      <div class="db-body">${strongHtml}</div>
    </div>

    <div class="detail-block">
      <div class="db-head" onclick="toggleBlock(this)">Слабые моменты <span class="db-arrow">▾</span></div>
      <div class="db-body">${weakHtml}</div>
    </div>

    <div class="detail-block">
      <div class="db-head" onclick="toggleBlock(this)">Рекомендации <span class="db-arrow">▾</span></div>
      <div class="db-body">${recsHtml}</div>
    </div>

    <div class="detail-block">
      <div class="db-head" onclick="toggleBlock(this)">Прогноз сделки <span class="db-arrow">▾</span></div>
      <div class="db-body">
        <div class="prob-big" style="color:${color}">${c.probability}%</div>
        <div class="prob-bar-full"><div class="prob-bar-full-fill" style="width:${fill}%;background:${color}"></div></div>
        <div>${factorsHtml}</div>
        <div class="next-step-box"><div class="ns-label">Следующий шаг</div><div class="ns-text">${c.next_step||'—'}</div></div>
      </div>
    </div>
  `;
}

function backToList() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('detail-view').innerHTML = '';
  document.getElementById('main-view').style.display = 'block';
}

function toggleBlock(el) {
  el.parentElement.classList.toggle('db-collapsed');
}

function setPeriod(p, btn) {
  state.period = p;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadCalls();
}

function setManager(m, btn) {
  state.manager = m;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadCalls();
}

loadCalls();
</script>
</body>
</html>
